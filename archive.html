---
layout: page
title: Archives
---

<ul class="posts-list">
  {% for post in site.posts %}
  <li>
    <div class="post">
      <h2 class="post-name">
	<a href="{{ post.url }}">
          {{ post.title }}
	</a>
	</h2>
      <span class="post-date">{{ post.date | date_to_string }}</span>
    </div>
  </li>
  {% endfor %}
</ul>
